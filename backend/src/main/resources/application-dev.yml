server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api
  error:
    include-message: always

spring:
  application:
    name: turnow-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: "SELECT 1"

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: true   # 🔥 activado para debug
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH:604800000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://dev.shiftya.online,https://www.shiftya.online}

  frontend-url: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.turnow: DEBUG
    org.hibernate.SQL: DEBUG              # 🔥 ver queries
    org.hibernate.type.descriptor.sql: TRACE  # 🔥 ver parámetros