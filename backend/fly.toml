# fly.toml app configuration file generated for turnow on 2026-05-04T12:52:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'turnow'
primary_region = 'iad'

[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  PORT = "8080"
  LOGGING_LEVEL_ROOT = "INFO"
  JAVA_OPTS = "-Dserver.address=0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.http]
    type = 'http'
    interval = '10s'
    timeout = '10s'
    grace_period = '180s'
    method = 'GET'
    path = '/actuator/health'
    protocol = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[checks]
  [checks.http]
    grace_period = "40s"
    interval = "10s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"
    type = "http"
