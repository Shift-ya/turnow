# fly.toml app configuration file generated for dev-turnow on 2026-05-05T01:54:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dev-turnow'
primary_region = 'gru'

[build]

[env]
  JAVA_OPTS = '-Dserver.address=0.0.0.0'
  LOGGING_LEVEL_ROOT = 'INFO'
  PORT = '8080'
  SPRING_PROFILES_ACTIVE = 'prod'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.http]
    type = 'http'
    interval = '10s'
    timeout = '5s'
    grace_period = '2m20s'
    method = 'GET'
    path = '/api/actuator/health'
    protocol = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
